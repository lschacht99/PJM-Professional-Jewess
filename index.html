<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Professional Jewess</title>
<meta name="description" content="A private mentorship network for frum Jewish women in the professions." />
<meta name="theme-color" content="#6E2438" />
<style>html,body{margin:0;padding:0}#root{min-height:100vh}#boot{font:500 15px/1.5 system-ui,sans-serif;color:#7A6B66;padding:40px;text-align:center}</style>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
</head>
<body>
<div id="root"><div id="boot">Loading…</div></div>
<script type="text/babel" data-presets="react">
const { useState, useMemo, useEffect } = React;

/* ============================================================
   PROFESSIONAL JEWESS — mobile-first mentorship network
   Front-end prototype. Simulated data + login + persona switch.
   Design system: "Heirloom Garnet" / signature = "The Registry"
   ============================================================ */

const CSS = `
@import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..600;1,9..144,300..600&family=Hanken+Grotesk:wght@400;500;600;700&family=Spline+Sans+Mono:wght@400;500&display=swap');

:root{
  --paper:#FBF7F2;
  --paper-deep:#F3ECE3;
  --surface:#FFFFFF;
  --ink:#241A24;
  --ink-soft:#4A3C45;
  --muted:#7E6F75;
  --garnet:#6E2438;
  --garnet-deep:#561B2C;
  --brass:#A9824B;
  --rose:#EAD9D2;
  --rose-deep:#E0C5BC;
  --line:rgba(36,26,36,.12);
  --line-soft:rgba(36,26,36,.07);
  --shadow:0 1px 2px rgba(36,26,36,.05), 0 18px 40px -28px rgba(36,26,36,.35);
  --serif:'Fraunces', Georgia, 'Times New Roman', serif;
  --sans:'Hanken Grotesk', ui-sans-serif, system-ui, -apple-system, sans-serif;
  --mono:'Spline Sans Mono', ui-monospace, Menlo, monospace;
}

.pj-root *{box-sizing:border-box}
.pj-root{
  font-family:var(--sans);
  color:var(--ink);
  background:var(--paper);
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
  line-height:1.55;
  min-height:100vh;
  position:relative;
}
.pj-root button{font-family:inherit;cursor:pointer}
.pj-root img{max-width:100%}
.pj-root :focus-visible{outline:2px solid var(--garnet);outline-offset:2px;border-radius:2px}

/* ---------- type helpers ---------- */
.pj-serif{font-family:var(--serif)}
.pj-mono{font-family:var(--mono)}
.pj-eyebrow{
  font:600 11.5px/1 var(--sans);
  letter-spacing:.22em;text-transform:uppercase;color:var(--brass);
}
.pj-muted{color:var(--muted)}
.pj-h1{font-family:var(--serif);font-weight:380;letter-spacing:-.01em;line-height:1.02;
  font-size:clamp(34px,9vw,62px);}
.pj-h1 em{font-style:italic;color:var(--garnet)}
.pj-h2{font-family:var(--serif);font-weight:400;line-height:1.08;letter-spacing:-.01em;
  font-size:clamp(25px,5.5vw,38px);}
.pj-h3{font-family:var(--serif);font-weight:440;font-size:21px;line-height:1.15;letter-spacing:-.01em}
.pj-lead{font-size:clamp(15.5px,3.6vw,18.5px);color:var(--ink-soft);line-height:1.5}
.pj-body{font-size:15.5px;color:var(--ink-soft)}
.pj-small{font-size:13px;color:var(--muted)}
.pj-label{font:600 11px/1 var(--sans);letter-spacing:.16em;text-transform:uppercase;color:var(--muted)}

/* ---------- layout ---------- */
.pj-wrap{width:100%;max-width:1080px;margin:0 auto;padding:0 22px}
.pj-section{padding:64px 0}
.pj-divider{height:1px;background:var(--line);border:0;margin:0}
.pj-stack-2{display:flex;flex-direction:column;gap:8px}
.pj-stack-4{display:flex;flex-direction:column;gap:16px}
.pj-row{display:flex;align-items:center;gap:12px}
.pj-rowb{display:flex;align-items:center;justify-content:space-between;gap:12px}
.pj-grow{flex:1}
.pj-hide-desk{display:block}
.pj-hide-mob{display:none}

/* ---------- buttons ---------- */
.pj-btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  font:600 14.5px/1 var(--sans);letter-spacing:.01em;
  padding:13px 20px;border-radius:999px;border:1px solid transparent;
  transition:transform .15s ease, background .2s ease, color .2s ease, border-color .2s ease;
  text-decoration:none;
}
.pj-btn:active{transform:translateY(1px)}
.pj-btn--primary{background:var(--garnet);color:#FBEFE9;border-color:var(--garnet)}
.pj-btn--primary:hover{background:var(--garnet-deep)}
.pj-btn--ghost{background:transparent;color:var(--ink);border-color:var(--line)}
.pj-btn--ghost:hover{border-color:var(--ink);background:rgba(36,26,36,.03)}
.pj-btn--light{background:var(--paper);color:var(--ink);border-color:transparent}
.pj-btn--light:hover{background:#fff}
.pj-btn--block{display:flex;width:100%}
.pj-btn--sm{padding:9px 14px;font-size:13px}
.pj-btn[disabled]{opacity:.45;pointer-events:none}
.pj-textlink{
  background:none;border:0;padding:0;color:var(--ink);font:600 14.5px/1 var(--sans);
  display:inline-flex;align-items:center;gap:6px;position:relative;
}
.pj-textlink span{box-shadow:inset 0 -1px 0 var(--brass);transition:box-shadow .2s}
.pj-textlink:hover span{box-shadow:inset 0 -2px 0 var(--garnet)}

/* ---------- pills / tags ---------- */
.pj-pill{
  font:600 12.5px/1 var(--sans);letter-spacing:.01em;
  padding:8px 13px;border-radius:999px;border:1px solid var(--line);
  background:transparent;color:var(--ink-soft);white-space:nowrap;
  transition:.18s;
}
.pj-pill:hover{border-color:var(--ink)}
.pj-pill--on{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.pj-tag{
  display:inline-flex;align-items:center;
  font:600 11.5px/1 var(--sans);letter-spacing:.01em;
  padding:6px 10px;border-radius:6px;background:var(--rose);color:var(--garnet);
}
.pj-taglist{display:flex;flex-wrap:wrap;gap:7px}

/* ---------- monogram ---------- */
.pj-mg{
  display:inline-flex;align-items:center;justify-content:center;flex:none;
  width:46px;height:46px;border-radius:999px;
  font-family:var(--serif);font-weight:460;font-size:17px;letter-spacing:.01em;
  user-select:none;
}
.pj-mg--lg{width:74px;height:74px;font-size:27px}
.pj-mg--xl{width:96px;height:96px;font-size:34px}
.pj-mg--sm{width:36px;height:36px;font-size:14px}

/* ---------- masthead ---------- */
.pj-mast{position:sticky;top:0;z-index:40;background:rgba(251,247,242,.86);backdrop-filter:blur(10px);
  border-bottom:1px solid var(--line)}
.pj-mast-in{display:flex;align-items:center;justify-content:space-between;height:62px}
.pj-brand{display:flex;align-items:baseline;gap:9px;text-decoration:none;color:var(--ink)}
.pj-brand b{font-family:var(--serif);font-weight:480;font-size:21px;letter-spacing:-.01em;line-height:1}
.pj-brand i{font-family:var(--serif);font-weight:480;font-style:italic;font-size:21px;color:var(--garnet);line-height:1}
.pj-brand .pj-no{font-family:var(--mono);font-size:11px;color:var(--brass);align-self:center}
.pj-nav{display:none;align-items:center;gap:26px}
.pj-navlink{background:none;border:0;color:var(--ink-soft);font:600 13.5px/1 var(--sans);letter-spacing:.01em;padding:6px 0}
.pj-navlink:hover{color:var(--ink)}

/* ---------- hero / registry ---------- */
.pj-hero{padding:46px 0 18px}
.pj-hero .pj-eyebrow{margin-bottom:18px}
.pj-hero .pj-lead{margin-top:18px;max-width:30em}
.pj-hero-cta{display:flex;flex-wrap:wrap;gap:10px;margin-top:26px}

.pj-registry{margin-top:40px;border-top:1px solid var(--ink)}
.pj-reg-cap{display:flex;justify-content:space-between;align-items:baseline;padding:12px 0 6px}
.pj-reg-list{position:relative}
.pj-reg-item{
  display:grid;grid-template-columns:34px 1fr auto;align-items:center;gap:14px;
  padding:15px 0;border-bottom:1px solid var(--line);position:relative;
}
.pj-reg-item:before{
  content:"";position:absolute;left:11px;top:50%;width:6px;height:6px;border-radius:999px;
  background:var(--brass);transform:translateY(-50%);
}
.pj-reg-rail{position:absolute;left:14px;top:0;bottom:0;width:1px;background:var(--line);z-index:0}
.pj-reg-idx{font-family:var(--mono);font-size:12px;color:var(--muted);padding-left:24px;z-index:1}
.pj-reg-name{font-family:var(--serif);font-weight:430;font-size:clamp(19px,4.6vw,24px);letter-spacing:-.01em;line-height:1.1}
.pj-reg-meta{font:600 11px/1 var(--sans);letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-top:5px}
.pj-reg-field{justify-self:end;text-align:right;font-family:var(--serif);font-style:italic;font-size:15px;color:var(--garnet)}

/* ---------- the path (ledger) ---------- */
.pj-path{position:relative;margin-top:8px}
.pj-path-item{display:grid;grid-template-columns:42px 1fr;gap:16px;padding:16px 0;position:relative;border-bottom:1px solid var(--line-soft)}
.pj-path-item:last-child{border-bottom:0}
.pj-path-num{font-family:var(--mono);font-size:13px;color:var(--garnet);padding-top:3px}
.pj-path-t{font-family:var(--serif);font-weight:430;font-size:19px;line-height:1.15;letter-spacing:-.01em}
.pj-path-d{font-size:14px;color:var(--muted);margin-top:3px}

/* ---------- cards / grids ---------- */
.pj-grid{display:grid;gap:16px}
.pj-card{background:var(--surface);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);padding:20px}
.pj-card--flat{box-shadow:none}
.pj-mentor-card{display:flex;flex-direction:column;gap:14px;text-align:left;width:100%;background:var(--surface);
  border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);padding:18px;transition:transform .18s ease, box-shadow .18s ease}
.pj-mentor-card:hover{transform:translateY(-2px);box-shadow:0 1px 2px rgba(36,26,36,.06), 0 26px 50px -30px rgba(36,26,36,.5)}
.pj-mentor-card .pj-row{align-items:flex-start}

/* ---------- dark band ---------- */
.pj-band{background:var(--ink);color:var(--paper)}
.pj-band .pj-eyebrow{color:var(--brass)}
.pj-band .pj-h2{color:#F6EFE7}
.pj-band .pj-lead,.pj-band .pj-body{color:#D8CAC5}
.pj-band .pj-divider{background:rgba(255,255,255,.14)}

/* ---------- cohort timeline ---------- */
.pj-tl{display:grid;gap:0;margin-top:10px}
.pj-tl-item{display:grid;grid-template-columns:18px 1fr;gap:16px;padding:14px 0;position:relative}
.pj-tl-dot{margin-top:6px;width:10px;height:10px;border-radius:999px;background:var(--brass);position:relative;z-index:1}
.pj-tl-item:not(:last-child):after{content:"";position:absolute;left:8px;top:18px;bottom:-14px;width:1px;background:rgba(255,255,255,.18)}
.pj-tl-when{font-family:var(--mono);font-size:12px;color:var(--brass);letter-spacing:.02em}
.pj-tl-what{font-family:var(--serif);font-size:18px;color:#F6EFE7;margin-top:2px}
.pj-tl-sub{font-size:13.5px;color:#C9BBB6;margin-top:1px}

/* ---------- stories ---------- */
.pj-story{display:flex;flex-direction:column;gap:12px;text-align:left;width:100%;background:transparent;border:0;border-top:1px solid var(--line);padding:22px 0}
.pj-story:hover .pj-story-t{color:var(--garnet)}
.pj-story-t{font-family:var(--serif);font-weight:430;font-size:clamp(20px,4.8vw,26px);line-height:1.14;letter-spacing:-.01em;transition:color .18s}
.pj-story-ex{font-size:14.5px;color:var(--ink-soft)}
.pj-story-by{display:flex;align-items:center;gap:10px}

/* ---------- footer ---------- */
.pj-footer{background:var(--ink);color:var(--paper);padding:48px 0 38px;margin-top:8px}
.pj-footer a,.pj-footer button{color:#CDBFBA;background:none;border:0;text-decoration:none;font:500 14px/1.9 var(--sans);text-align:left}
.pj-footer a:hover,.pj-footer button:hover{color:#fff}

/* ============ APP SHELL ============ */
.pj-app{min-height:100vh;background:var(--paper);padding-bottom:78px}
.pj-appbar{position:sticky;top:0;z-index:30;background:rgba(251,247,242,.92);backdrop-filter:blur(10px);
  border-bottom:1px solid var(--line)}
.pj-appbar-in{display:flex;align-items:center;justify-content:space-between;height:58px;gap:10px}
.pj-appnav{display:none;align-items:center;gap:6px}
.pj-appnav button{background:none;border:0;color:var(--ink-soft);font:600 13px/1 var(--sans);padding:9px 12px;border-radius:999px}
.pj-appnav button.on{background:var(--ink);color:var(--paper)}
.pj-appnav button:hover{color:var(--ink)}

.pj-asof{display:inline-flex;align-items:center;gap:7px;background:transparent;border:1px solid var(--line);
  border-radius:999px;padding:6px 10px;font:600 12px/1 var(--sans);color:var(--ink-soft)}
.pj-asof b{font-weight:700;color:var(--ink);text-transform:capitalize}

.pj-screen{padding:22px 0 40px;animation:pj-fade .35s ease both}
.pj-screen-head{margin-bottom:18px}
.pj-screen-title{font-family:var(--serif);font-weight:420;font-size:30px;letter-spacing:-.01em;line-height:1.05}

.pj-tabbar{position:fixed;left:0;right:0;bottom:0;z-index:50;background:rgba(251,247,242,.94);
  backdrop-filter:blur(12px);border-top:1px solid var(--line);
  display:flex;justify-content:space-around;padding:7px 6px calc(7px + env(safe-area-inset-bottom,0px));}
.pj-tab{display:flex;flex-direction:column;align-items:center;gap:4px;background:none;border:0;
  padding:6px 8px;color:var(--muted);font:600 10px/1 var(--sans);letter-spacing:.03em;border-radius:12px;min-width:58px}
.pj-tab svg{width:22px;height:22px;display:block}
.pj-tab.on{color:var(--garnet)}
.pj-tab.on .pj-tab-dot{opacity:1}
.pj-tab-dot{width:4px;height:4px;border-radius:999px;background:var(--garnet);opacity:0;margin-top:-1px}

/* match / thread */
.pj-match{background:var(--surface);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);overflow:hidden}
.pj-match-top{padding:18px 18px 6px}
.pj-thread-wrap{display:flex;align-items:center;justify-content:center;gap:0;padding:6px 18px 14px}
.pj-thread-svg{flex:1;height:40px}
.pj-thread-path{fill:none;stroke:var(--brass);stroke-width:1.4;stroke-dasharray:200;stroke-dashoffset:200;
  animation:pj-draw 1.1s ease .25s forwards}
.pj-thread-node{fill:var(--garnet)}

/* schedule slots */
.pj-slot{display:flex;align-items:center;justify-content:space-between;gap:12px;width:100%;text-align:left;
  background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:15px 16px;transition:.16s}
.pj-slot:hover{border-color:var(--ink)}
.pj-slot--on{border-color:var(--garnet);background:#fff;box-shadow:0 0 0 1px var(--garnet) inset}
.pj-slot-day{font-family:var(--serif);font-size:18px;letter-spacing:-.01em}
.pj-slot-time{font:600 13px/1 var(--sans);color:var(--muted);margin-top:3px;letter-spacing:.02em}
.pj-slot-radio{width:20px;height:20px;border-radius:999px;border:1.5px solid var(--line);flex:none;display:grid;place-items:center}
.pj-slot--on .pj-slot-radio{border-color:var(--garnet)}
.pj-slot--on .pj-slot-radio:after{content:"";width:10px;height:10px;border-radius:999px;background:var(--garnet)}

/* completion bar */
.pj-bar{height:7px;border-radius:999px;background:var(--paper-deep);overflow:hidden;border:1px solid var(--line-soft)}
.pj-bar > i{display:block;height:100%;background:linear-gradient(90deg,var(--garnet),var(--brass));border-radius:999px}

/* admin rows */
.pj-arow{display:grid;grid-template-columns:1fr auto;align-items:center;gap:12px;padding:14px 0;border-bottom:1px solid var(--line-soft)}
.pj-status{font:700 11px/1 var(--sans);letter-spacing:.08em;text-transform:uppercase;padding:5px 9px;border-radius:999px}
.pj-status--new{background:var(--rose);color:var(--garnet)}
.pj-status--ok{background:#E7EFE6;color:#3C6B3F}
.pj-status--hold{background:#F0E9DD;color:#8A6D2E}

/* chips (availability editor) */
.pj-chips{display:flex;flex-wrap:wrap;gap:8px}
.pj-chip{font:600 12.5px/1 var(--sans);padding:9px 12px;border-radius:10px;border:1px dashed var(--line);
  background:transparent;color:var(--ink-soft)}
.pj-chip--on{border-style:solid;border-color:var(--garnet);background:#fff;color:var(--garnet)}

/* horizontal scroller */
.pj-scroller{display:flex;gap:12px;overflow-x:auto;scroll-snap-type:x mandatory;
  margin:0 -22px;padding:2px 22px 6px;-webkit-overflow-scrolling:touch}
.pj-scroller::-webkit-scrollbar{display:none}
.pj-scroller > *{scroll-snap-align:start;flex:0 0 215px}

/* modal */
.pj-modal{position:fixed;inset:0;z-index:80;display:flex;align-items:flex-end;justify-content:center;
  background:rgba(36,26,36,.42);backdrop-filter:blur(2px);animation:pj-fade .2s ease both;padding:0}
.pj-modal-card{background:var(--paper);width:100%;max-width:520px;border-radius:22px 22px 0 0;
  padding:24px 22px calc(26px + env(safe-area-inset-bottom,0px));max-height:92vh;overflow:auto;
  animation:pj-rise .3s cubic-bezier(.2,.7,.2,1) both;box-shadow:0 -20px 60px -20px rgba(36,26,36,.5)}
.pj-modal-grab{width:38px;height:4px;border-radius:999px;background:var(--line);margin:0 auto 16px}
.pj-field{display:block;margin-bottom:14px}
.pj-field label{display:block;font:600 12px/1 var(--sans);letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-bottom:7px}
.pj-input,.pj-select{width:100%;font:500 15px/1.3 var(--sans);color:var(--ink);background:#fff;
  border:1px solid var(--line);border-radius:12px;padding:13px 14px}
.pj-input:focus,.pj-select:focus{outline:none;border-color:var(--garnet)}
.pj-choice{display:flex;flex-direction:column;gap:9px}
.pj-choice button{display:flex;align-items:center;justify-content:space-between;gap:10px;text-align:left;
  background:#fff;border:1px solid var(--line);border-radius:14px;padding:15px 16px;transition:.16s}
.pj-choice button:hover{border-color:var(--ink)}
.pj-choice button.on{border-color:var(--garnet);box-shadow:0 0 0 1px var(--garnet) inset}
.pj-choice .pj-h3{font-size:18px}
.pj-dots{display:flex;gap:6px;justify-content:center;margin-top:4px}
.pj-dots i{width:7px;height:7px;border-radius:999px;background:var(--line)}
.pj-dots i.on{background:var(--garnet);width:20px}

/* detail header */
.pj-detail-hero{display:flex;flex-direction:column;gap:16px}
.pj-back{display:inline-flex;align-items:center;gap:7px;background:none;border:0;color:var(--ink-soft);
  font:600 13px/1 var(--sans);padding:4px 0;margin-bottom:10px}
.pj-back:hover{color:var(--ink)}
.pj-defrow{display:grid;grid-template-columns:1fr;gap:6px;padding:16px 0;border-top:1px solid var(--line-soft)}
.pj-defrow dt{font:600 11px/1 var(--sans);letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
.pj-defrow dd{margin:0;font-size:15px;color:var(--ink-soft)}

.pj-sticky-cta{position:sticky;bottom:88px;z-index:20;display:flex;gap:10px;
  background:linear-gradient(transparent, var(--paper) 40%);padding-top:18px;margin-top:8px}

/* quote */
.pj-quote{font-family:var(--serif);font-style:italic;font-weight:380;font-size:clamp(18px,4.5vw,23px);
  line-height:1.3;letter-spacing:-.01em}

/* small kpi */
.pj-kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:0;border:1px solid rgba(255,255,255,.16);border-radius:16px;overflow:hidden}
.pj-kpi{padding:16px 14px;text-align:left}
.pj-kpi + .pj-kpi{border-left:1px solid rgba(255,255,255,.16)}
.pj-kpi b{font-family:var(--serif);font-weight:430;font-size:30px;color:#F6EFE7;display:block;line-height:1}
.pj-kpi span{font:600 10.5px/1.3 var(--sans);letter-spacing:.1em;text-transform:uppercase;color:var(--brass);margin-top:7px;display:block}

/* anim */
@keyframes pj-fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
@keyframes pj-rise{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:none}}
@keyframes pj-draw{to{stroke-dashoffset:0}}

/* ---------- apply flow (4 steps) ---------- */
function ApplyFlow({ onClose, onEnter, initialRole }) {
  const [role, setRole] = useState(initialRole || null);
  const [field, setField] = useState(null);
  const [stage, setStage] = useState(null);
  const [obs, setObs] = useState(null);
  const [avail, setAvail] = useState(null);
  const [needs, setNeeds] = useState([]);
  const min = initialRole ? 1 : 0;
  const [step, setStep] = useState(min);
  const toggleNeed = (n) => setNeeds((c) => c.includes(n) ? c.filter((x) => x !== n) : [...c, n]);
  const isMentor = role === "mentor";
  const labels = ["You", "Field", "Stage", "Fit", "Focus", "Done"];
  const last = labels.length - 1;
  const canNext = step === 0 ? !!role : step === 1 ? !!field : step === 2 ? !!stage : step === 3 ? !!avail : true;

  const Pills = ({ list, value, set, multi }) => (
    <div className="pj-taglist">
      {list.map((x) => {
        const on = multi ? needs.includes(x) : value === x;
        return <button key={x} className={"pj-pill" + (on ? " pj-pill--on" : "")} onClick={() => (multi ? toggleNeed(x) : set(x))}>{x}</button>;
      })}
    </div>
  );

  return (
    <div className="pj-modal" onClick={onClose}>
      <div className="pj-modal-card" onClick={(e) => e.stopPropagation()}>
        <div className="pj-modal-grab" />
        <div className="pj-rowb" style={{ marginBottom: 14 }}>
          <span className="pj-label">{role ? (isMentor ? "Become a mentor" : "Find a mentor") : "Join"} · {labels[step]}</span>
          <button className="pj-textlink" onClick={onClose}><span>Close</span></button>
        </div>

        {step === 0 && (
          <>
            <h3 className="pj-h2" style={{ fontSize: 25, marginBottom: 6 }}>What brings you here?</h3>
            <p className="pj-small" style={{ marginBottom: 14 }}>Both sides answer a few questions so we can match thoughtfully.</p>
            <div className="pj-choice">
              {[["mentee", "I want a mentor", "I'm a student or early in my career and want guidance."],
                ["mentor", "I want to mentor", "I've built a career and want to guide someone."]].map(([k, t, d]) => (
                <button key={k} className={role === k ? "on" : ""} onClick={() => setRole(k)}>
                  <span><span className="pj-h3">{t}</span><div className="pj-small" style={{ marginTop: 4 }}>{d}</div></span>
                  {role === k && I.check({ width: 20, height: 20, style: { color: "var(--garnet)" } })}
                </button>
              ))}
            </div>
          </>
        )}

        {step === 1 && (
          <>
            <h3 className="pj-h2" style={{ fontSize: 25, marginBottom: 6 }}>{isMentor ? "What's your field?" : "Which field do you want to explore?"}</h3>
            <p className="pj-small" style={{ marginBottom: 14 }}>We match mentors and mentees by field first.</p>
            <Pills list={FIELDS} value={field} set={setField} />
          </>
        )}

        {step === 2 && (
          <>
            <h3 className="pj-h2" style={{ fontSize: 25, marginBottom: 6 }}>{isMentor ? "How long have you been at it?" : "Where are you now?"}</h3>
            <p className="pj-small" style={{ marginBottom: 14 }}>{isMentor ? "So we pair you with the right stage." : "So we match you to the right guide."}</p>
            <Pills list={isMentor ? EXPERIENCE : STAGES} value={stage} set={setStage} />
          </>
        )}

        {step === 3 && (
          <>
            <h3 className="pj-h2" style={{ fontSize: 25, marginBottom: 6 }}>A few things to match on.</h3>
            <p className="pj-small" style={{ marginBottom: 12 }}>Community is optional and always respectful.</p>
            <span className="pj-label">Community <span style={{ textTransform: "none", letterSpacing: 0, color: "var(--muted)", fontWeight: 500 }}>(optional)</span></span>
            <div style={{ marginTop: 8, marginBottom: 16 }}><Pills list={OBSERVANCE} value={obs} set={setObs} /></div>
            <span className="pj-label">{isMentor ? "How you'd like to mentor" : "What you're up for"}</span>
            <div style={{ marginTop: 8 }}><Pills list={AVAIL_PREF} value={avail} set={setAvail} /></div>
          </>
        )}

        {step === 4 && (
          <>
            <h3 className="pj-h2" style={{ fontSize: 25, marginBottom: 6 }}>{isMentor ? "What can you help with?" : "What would help most?"}</h3>
            <p className="pj-small" style={{ marginBottom: 14 }}>Pick any. This sharpens the match.</p>
            <Pills list={HELP_OPTIONS} multi />
          </>
        )}

        {step === 5 && (
          <div style={{ textAlign: "center", padding: "8px 0 4px" }}>
            <span className="pj-mg pj-mg--lg" style={{ background: "var(--garnet)", color: "#F6E7E1", margin: "0 auto" }}>{I.check({ width: 32, height: 32 })}</span>
            <h3 className="pj-h2" style={{ fontSize: 25, marginTop: 16 }}>Welcome.</h3>
            <p className="pj-body" style={{ marginTop: 8, maxWidth: "27em", marginInline: "auto" }}>
              We match on what you just shared — <b>field, stage, community, and availability</b>.
              {isMentor ? " You'll set your visibility and the team brings you a well-matched mentee." : " Next, read a few mentor previews and name up to three you'd like to learn from."}
            </p>
          </div>
        )}

        <div className="pj-dots" style={{ marginTop: 22 }}>
          {labels.map((_, i) => <i key={i} className={i === step ? "on" : ""} />)}
        </div>
        <div className="pj-row" style={{ gap: 10, marginTop: 18 }}>
          {step > min && step < last && <button className="pj-btn pj-btn--ghost" onClick={() => setStep(step - 1)}>Back</button>}
          {step < last && <button className="pj-btn pj-btn--primary pj-grow" disabled={!canNext} onClick={() => setStep(step + 1)}>Continue</button>}
          {step === last && <button className="pj-btn pj-btn--primary pj-btn--block" onClick={() => onEnter(role)}>{isMentor ? "Go to my mentor space" : "Read mentor previews"}</button>}
        </div>
      </div>
    </div>
  );
}

  function renderThread() {

    const t = TONES[p.tone] || TONES.rose;
    const replies = p.replies || [];
    const mz = p.mazel + ((react[p.id] && react[p.id].m) ? 1 : 0);
    const cz = p.chazak + ((react[p.id] && react[p.id].c) ? 1 : 0);
    return (
      <div className="pj-screen">
        <button className="pj-back" onClick={() => { setOpenThread(null); setReplyInput(""); }}>{I.back({ width: 16, height: 16 })} Cohort feed</button>

            </div>
            <h3 className="pj-h2" style={{ fontSize: 25, marginBottom: 6 }}>Enter the network.</h3>
            <p className="pj-small" style={{ marginBottom: 16 }}>This is a prototype — choose a persona to explore the private side.</p>
            <div className="pj-choice">
              {[["mentee", "As a mentee", "See the feed, choose preferences, get matched."],
                ["mentor", "As a mentor", "Set visibility, approve a match, mentor someone."],
                ["admin", "As an admin", "Run matching week and pair mentees."]].map(([k, t, d]) => (
                <button key={k} onClick={() => enterApp(k)}>
                  <span><span className="pj-h3">{t}</span><div className="pj-small" style={{ marginTop: 4 }}>{d}</div></span>
                  {I.arrow({ width: 18, height: 18, style: { color: "var(--garnet)" } })}
                </button>
              ))}
            </div>
          </div>
        </div>
      )}

      {apply && <ApplyFlow onClose={() => { setApply(false); setApplyRole(null); }} onEnter={(r) => enterApp(r === "mentor" ? "mentor" : "mentee")} initialRole={applyRole} />}

      {whyOpen && (
        <div className="pj-modal" onClick={() => setWhyOpen(false)}>
          <div className="pj-modal-card" onClick={(e) => e.stopPropagation()}>
            <div className="pj-modal-grab" />
            <div className="pj-rowb" style={{ marginBottom: 14 }}>
              <span className="pj-label">Your preferences</span>
              <button className="pj-textlink" onClick={() => setWhyOpen(false)}><span>Close</span></button>
            </div>
            <h3 className="pj-h2" style={{ fontSize: 25, marginBottom: 6 }}>Why these three?</h3>
            <p className="pj-small" style={{ marginBottom: 14 }}>A sentence or two helps the team match you well.</p>
            <div className="pj-taglist" style={{ marginBottom: 14 }}>
              {prefs.map((id) => { const m = MENTORS.find((x) => x.id === id); return <span className="pj-tag" key={id}>{MENTOR_VIS[id] === "public" ? m.name : m.role}</span>; })}
            </div>
            <div className="pj-field">
              <label>In your words</label>
              <textarea className="pj-input" rows={4} value={prefsWhy} onChange={(e) => setPrefsWhy(e.target.value)} placeholder="I'm drawn to women who've navigated frum life in a demanding field…" style={{ resize: "vertical", fontFamily: "var(--sans)" }} />
            </div>
            <button className="pj-btn pj-btn--primary pj-btn--block" onClick={() => { setPrefsSubmitted(true); setWhyOpen(false); window.scrollTo(0, 0); }}>Submit my preferences</button>
            <p className="pj-small" style={{ textAlign: "center", marginTop: 12 }}>The team matches you within matching week.</p>
          </div>
        </div>
      )}

      {composerOpen && (
        <div className="pj-modal" onClick={() => setComposerOpen(false)}>
          <div className="pj-modal-card" onClick={(e) => e.stopPropagation()}>
            <div className="pj-modal-grab" />
            <div className="pj-rowb" style={{ marginBottom: 14 }}>
              <span className="pj-label">Post to your cohort</span>
              <button className="pj-textlink" onClick={() => setComposerOpen(false)}><span>Close</span></button>
            </div>
            <div className="pj-row" style={{ gap: 8, marginBottom: 14 }}>
              {[["post", "Just a post"], ["milestone", "🎉 A milestone"]].map(([k, l]) => (
                <button key={k} className={"pj-pill" + (composerKind === k ? " pj-pill--on" : "")} onClick={() => setComposerKind(k)}>{l}</button>
              ))}
            </div>
            <div className="pj-field">
              <label>{composerKind === "milestone" ? "What are you celebrating?" : "What's happening?"}</label>
              <textarea className="pj-input" rows={4} value={composerText} onChange={(e) => setComposerText(e.target.value)} placeholder={composerKind === "milestone" ? "Just got into the program after two years of doubt…" : "Studying for boards and questioning everything 😅"} style={{ resize: "vertical", fontFamily: "var(--sans)" }} />
            </div>
            <button className="pj-btn pj-btn--primary pj-btn--block" disabled={!composerText.trim()} onClick={addPost}>Post to cohort</button>
            <p className="pj-small" style={{ textAlign: "center", marginTop: 12 }}>Only your cohort sees this. They react with <em>mazel tov</em> and <em>chazak</em> — never a like.</p>
          </div>
        </div>
      )}
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
</body>
</html>
